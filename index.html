<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Smart Detection</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <style>
    body { text-align:center; font-family: Arial; }
    #status { font-size:25px; margin-top:10px; }
    canvas { position:absolute; left:0; top:0; }
    .container { position:relative; display:inline-block; }
  </style>
</head>
<body>

<h2>ESP32 Smart Security System</h2>

<div class="container">
  <img id="stream" src="http://192.168.43.28:81/stream" width="400">
  <canvas id="canvas"></canvas>
</div>

<h2 id="status">Loading Model...</h2>

<script>

const img = document.getElementById("stream");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

canvas.width = 400;
canvas.height = 300;

let model;

// Load AI model
async function loadModel() {
  model = await cocoSsd.load();
  statusText.innerText = "Model Loaded!";
  detectObjects(); 
  consle.log("th");
}

async function detectObjects() {

  const predictions = await model.detect(img);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let objectDetected = false;

  predictions.forEach(pred => {
    if (pred.score > 0.6) {

      objectDetected = true;

      ctx.strokeStyle = "red";
      ctx.lineWidth = 2;
      ctx.strokeRect(
        pred.bbox[0],
        pred.bbox[1],
        pred.bbox[2],
        pred.bbox[3]
      );

      ctx.fillStyle = "red";
      ctx.fillText(
        pred.class,
        pred.bbox[0],
        pred.bbox[1] > 10 ? pred.bbox[1] - 5 : 10
      );
    }
  });

  detectFire();

  if (objectDetected) {
    statusText.innerText = "? OBJECT DETECTED!";
  } else {
    statusText.innerText = "No Object";
  }

  requestAnimationFrame(detectObjects);
}

// ?? Fire detection by color
function detectFire() {

  ctx.drawImage(img, 0, 0, 160, 120);
  let frame = ctx.getImageData(0, 0, 160, 120);

  let firePixels = 0;

  for (let i = 0; i < frame.data.length; i += 4) {
    let r = frame.data[i];
    let g = frame.data[i+1];
    let b = frame.data[i+2];

    if (r > 150 && g > 80 && b < 120 && r > g && g > b) {
      firePixels++;
    }
  }

  if (firePixels > 1500) {
    statusText.innerText = "?? FIRE DETECTED!";
  }
}

loadModel();

</script>

</body>
</html>
